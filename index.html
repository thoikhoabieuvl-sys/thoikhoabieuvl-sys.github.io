<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biểu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .nav-link {
            padding: 8px 16px; 
            border-radius: 9999px; 
            transition: all 0.2s ease-in-out; 
            font-weight: 500;
            color: #4b5563;
        }
        .nav-link.active { 
            background-color: #4f46e5; 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .timetable-image-display {
            position: relative;
            width: 100%;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timetable-image-display img {
            width: 100%; 
            height: auto; 
            max-height: 80vh; 
            object-fit: contain; 
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            cursor: zoom-in;
            transition: opacity 0.3s ease;
        }
        
        /* Lightbox CSS - Fullscreen Mode */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; /* Nền đen tuyền xem tập trung hơn */
            z-index: 1000;
            overflow: hidden; /* Tắt cuộn thừa */
            align-items: center;
            justify-content: center;
        }
        #lightbox.active { display: flex; }
        #lightbox img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Tự động vừa vặn khít màn hình */
            cursor: zoom-out;
        }
        /* Nút đóng (X) góc phải trên */
        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            z-index: 1010;
        }
        #close-btn:hover { background: rgba(255,255,255,0.4); }

        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
            position: absolute;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-4 md:p-6">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-2">Thời Khóa Biểu Của Tôi</h1>
        
        <!-- Hiển thị thông tin Tuần (Mặc định hiển thị) -->
        <p id="tuan-info" class="text-center text-gray-600 font-medium mb-6">
            Thời khóa biểu tuần: <span id="tuan-text" class="text-indigo-600 font-bold">Đang tải...</span>
        </p>

        <!-- Navigation -->
        <div class="flex justify-center space-x-2 md:space-x-4 mb-6 bg-gray-100 p-1.5 rounded-full inline-flex mx-auto w-max">
            <a href="#sang" class="nav-link active" id="btn-sang">Buổi Sáng</a>
            <a href="#chieu" class="nav-link" id="btn-chieu">Buổi Chiều</a>
        </div>

        <!-- Image Display Area -->
        <div class="timetable-image-display bg-gray-50 rounded-xl border border-dashed border-gray-300 p-2">
            <div id="loading" class="loader hidden"></div>
            <!-- Mặc định ẩn ảnh, nếu lỗi không có ảnh sẽ hiện chữ -->
            <img id="main-tkb-img" src="" alt="Chưa có thời khóa biểu" class="hidden" onerror="this.classList.add('hidden'); document.getElementById('error-msg').classList.remove('hidden');">
            <p id="error-msg" class="text-gray-500 hidden text-center p-8">Chưa có dữ liệu Thời khóa biểu cho buổi này.<br><span class="text-sm">Vui lòng upload ảnh lên Github.</span></p>
        </div>
    </div>

    <!-- Lightbox Fullscreen -->
    <div id="lightbox">
        <div id="close-btn">&times;</div>
        <img id="lightbox-img" src="" alt="Zoomed TKB">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // CẤU HÌNH ĐƯỜNG DẪN ẢNH (Tên file bạn sẽ upload lên Github)
            const TKB_FILES = {
                'sang': 'sang.jpg',   // Đổi thành .png nếu bạn hay dùng ảnh png
                'chieu': 'chieu.jpg',
                'default': 'sang'
            };
            const TUAN_FILE = 'tuan.txt'; // Tên file text chứa thông tin tuần

            const mainImg = document.getElementById('main-tkb-img');
            const errorMsg = document.getElementById('error-msg');
            const loading = document.getElementById('loading');
            const navLinks = document.querySelectorAll('.nav-link');
            const tuanInfo = document.getElementById('tuan-info');
            const tuanText = document.getElementById('tuan-text');

            // --- TẢI THÔNG TIN TUẦN TỪ FILE TEXT ---
            function loadTuanInfo() {
                const cacheBuster = new Date().getTime();
                fetch(`${TUAN_FILE}?v=${cacheBuster}`)
                    .then(response => {
                        if (!response.ok) throw new Error('Không tìm thấy file');
                        return response.text();
                    })
                    .then(text => {
                        if (text.trim() !== '') {
                            tuanText.textContent = text.trim();
                        } else {
                            tuanText.textContent = 'Chưa có thông tin';
                        }
                    })
                    .catch(error => {
                        console.log('Chưa có file tuan.txt hoặc nội dung trống.');
                        tuanText.textContent = 'Chưa có dữ liệu (Hãy tạo file tuan.txt)';
                    });
            }
            
            // Gọi hàm tải thông tin tuần ngay khi trang vừa tải
            loadTuanInfo();

            // Hàm xử lý khi đổi tab
            function handleRouting() {
                let hash = window.location.hash.substring(1);
                if (!TKB_FILES[hash]) {
                    hash = TKB_FILES.default;
                    window.location.hash = hash;
                    return;
                }

                // Cập nhật UI nút bấm
                navLinks.forEach(link => {
                    if (link.getAttribute('href') === '#' + hash) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });

                // TẢI ẢNH VÀ CHỐNG CACHE
                loadTkbImage(TKB_FILES[hash]);
            }

            function loadTkbImage(filename) {
                // Hiện loading, ẩn ảnh và lỗi
                loading.classList.remove('hidden');
                mainImg.classList.add('hidden');
                errorMsg.classList.add('hidden');

                // TẠO URL CHỐNG CACHE (Cache-Busting)
                // Thêm chuỗi ?v=thời_gian_hiện_tại vào sau tên file. 
                // Việc này khiến Github/Trình duyệt tưởng đây là file mới và bắt buộc tải lại ảnh mới nhất.
                const cacheBuster = new Date().getTime(); 
                const imageUrl = `${filename}?v=${cacheBuster}`;

                // Tạo đối tượng Image mới để tải ngầm
                const tempImg = new Image();
                tempImg.onload = function() {
                    mainImg.src = imageUrl;
                    mainImg.classList.remove('hidden');
                    loading.classList.add('hidden');
                };
                tempImg.onerror = function() {
                    loading.classList.add('hidden');
                    errorMsg.classList.remove('hidden');
                };
                tempImg.src = imageUrl;
            }

            // --- XỬ LÝ LIGHTBOX (FULLSCREEN ẢNH) ---
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('close-btn');

            mainImg.addEventListener('click', () => {
                lightboxImg.src = mainImg.src;
                lightbox.classList.add('active');
                
                // Mở Fullscreen (Tràn viền, ẩn thanh trình duyệt trên điện thoại)
                if (lightbox.requestFullscreen) {
                    lightbox.requestFullscreen().catch(err => console.log(err));
                } else if (lightbox.webkitRequestFullscreen) { /* Cho Safari/iOS */
                    lightbox.webkitRequestFullscreen();
                }
            });

            // Hàm đóng lightbox và thoát fullscreen
            function closeLightbox() {
                lightbox.classList.remove('active');
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                }
            }

            // Đóng khi bấm vào nút X, nền đen, hoặc bấm trực tiếp vào ảnh
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox || e.target === closeBtn || e.target === lightboxImg) {
                    closeLightbox();
                }
            });

            // Lắng nghe sự thay đổi URL (Hash)
            window.addEventListener('hashchange', handleRouting);
            
            // Khởi chạy lần đầu
            handleRouting();
        });
    </script>
</body>
</html>
