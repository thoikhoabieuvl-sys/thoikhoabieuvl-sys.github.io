<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biểu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .nav-link {
            padding: 8px 16px; 
            border-radius: 9999px; 
            transition: all 0.2s ease-in-out; 
            font-weight: 500;
            color: #4b5563;
        }
        .nav-link.active { 
            background-color: #4f46e5; 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .timetable-image-display {
            position: relative;
            width: 100%;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .timetable-image-display img {
            width: 100%; 
            height: auto; 
            max-height: 80vh; 
            object-fit: contain; 
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            cursor: zoom-in;
            transition: opacity 0.3s ease;
        }
        
        /* --- LIGHTBOX CẢI TIẾN --- */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            z-index: 1000;
            overflow: auto; /* Cho phép cuộn khi ảnh to */
            align-items: center;
            justify-content: center;
        }
        #lightbox.active { display: flex; }
        
        /* Trạng thái 1: Vừa khít màn hình */
        #lightbox:not(.zoomed-in) img {
            max-width: 95%;
            max-height: 95vh;
            object-fit: contain;
            cursor: zoom-in;
            margin: auto;
            transition: transform 0.2s ease;
        }

        /* Trạng thái 2: Khi được click để Phóng to (Zoomed-in) */
        #lightbox.zoomed-in {
            align-items: flex-start; /* Reset căn giữa để cuộn đúng */
            justify-content: flex-start;
        }
        #lightbox.zoomed-in img {
            width: 250vw; /* Trên mobile: Ảnh to gấp 2.5 lần màn hình để dễ đọc chữ */
            max-width: none;
            max-height: none;
            cursor: grab;
            margin: 0; /* Xóa margin khi cuộn */
        }
        @media (min-width: 768px) {
            #lightbox.zoomed-in img {
                width: 150vw; /* Trên PC màn hình to rồi, chỉ cần to gấp 1.5 lần */
            }
        }
        #lightbox.zoomed-in img:active { cursor: grabbing; }

        /* Nút X đóng */
        #close-btn {
            position: fixed; /* Fixed để lúc cuộn ảnh nó không bị chạy mất */
            top: 15px;
            right: 15px;
            color: white;
            font-size: 2rem;
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            cursor: pointer;
            z-index: 1010;
            backdrop-filter: blur(4px);
        }
        #close-btn:hover { background: rgba(255,255,255,0.4); }

        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
            position: absolute;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-4 md:p-6">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-2">Thời Khóa Biểu Trường THCS Vạn Linh</h1>
        
        <!-- Hiển thị thông tin Tuần -->
        <p id="tuan-info" class="text-center text-gray-600 font-medium mb-6">
            Thời khóa biểu tuần: <span id="tuan-text" class="text-indigo-600 font-bold">Đang tải...</span>
        </p>

        <!-- Navigation -->
        <div class="flex justify-center space-x-2 md:space-x-4 mb-6 bg-gray-100 p-1.5 rounded-full inline-flex mx-auto w-max">
            <a href="#sang" class="nav-link active" id="btn-sang">Buổi Sáng</a>
            <a href="#chieu" class="nav-link" id="btn-chieu">Buổi Chiều</a>
        </div>

        <!-- Image Display Area -->
        <div class="timetable-image-display bg-gray-50 rounded-xl border border-dashed border-gray-300 p-2">
            <div id="loading" class="loader hidden"></div>
            <img id="main-tkb-img" src="" alt="Chưa có thời khóa biểu" class="hidden" onerror="this.classList.add('hidden'); document.getElementById('error-msg').classList.remove('hidden');">
            <p id="error-msg" class="text-gray-500 hidden text-center p-8">Chưa có dữ liệu Thời khóa biểu cho buổi này.<br><span class="text-sm">Vui lòng upload ảnh lên Github.</span></p>
        </div>
    </div>

    <!-- Lightbox Zoom -->
    <div id="lightbox">
        <div id="close-btn">&times;</div>
        <img id="lightbox-img" src="" alt="Zoomed TKB">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const TKB_FILES = { 'sang': 'sang.jpg', 'chieu': 'chieu.jpg', 'default': 'sang' };
            const TUAN_FILE = 'tuan.txt';

            const mainImg = document.getElementById('main-tkb-img');
            const errorMsg = document.getElementById('error-msg');
            const loading = document.getElementById('loading');
            const navLinks = document.querySelectorAll('.nav-link');
            const tuanText = document.getElementById('tuan-text');

            function loadTuanInfo() {
                const cacheBuster = new Date().getTime();
                fetch(`${TUAN_FILE}?v=${cacheBuster}`)
                    .then(response => { if (!response.ok) throw new Error('Không tìm thấy'); return response.text(); })
                    .then(text => { tuanText.textContent = text.trim() !== '' ? text.trim() : 'Chưa có thông tin'; })
                    .catch(() => { tuanText.textContent = 'Chưa có dữ liệu'; });
            }
            loadTuanInfo();

            function handleRouting() {
                let hash = window.location.hash.substring(1);
                if (!TKB_FILES[hash]) { hash = TKB_FILES.default; window.location.hash = hash; return; }
                navLinks.forEach(link => { link.classList.toggle('active', link.getAttribute('href') === '#' + hash); });
                loadTkbImage(TKB_FILES[hash]);
            }

            function loadTkbImage(filename) {
                loading.classList.remove('hidden'); mainImg.classList.add('hidden'); errorMsg.classList.add('hidden');
                const tempImg = new Image();
                tempImg.onload = () => { mainImg.src = tempImg.src; mainImg.classList.remove('hidden'); loading.classList.add('hidden'); };
                tempImg.onerror = () => { loading.classList.add('hidden'); errorMsg.classList.remove('hidden'); };
                tempImg.src = `${filename}?v=${new Date().getTime()}`;
            }

            // --- XỬ LÝ LIGHTBOX (ZOOM THÔNG MINH) ---
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('close-btn');
            let isPanning = false, startX, startY, scrollLeftStart, scrollTopStart;

            // Mở ảnh
            mainImg.addEventListener('click', () => {
                lightboxImg.src = mainImg.src;
                lightbox.classList.add('active');
                lightbox.classList.remove('zoomed-in');
            });

            function closeLightbox() {
                lightbox.classList.remove('active');
                lightbox.classList.remove('zoomed-in');
            }

            // Đóng ảnh
            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox(); // Bấm ra ngoài lề đen để đóng
            });

            // Click vào ảnh để phóng to/thu nhỏ
            lightboxImg.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lightbox.classList.contains('zoomed-in')) {
                    // Đang to -> Thu nhỏ lại
                    lightbox.classList.remove('zoomed-in');
                } else {
                    // Đang nhỏ -> Phóng to lên
                    // Tính toán tọa độ bấm để cuộn đúng vào điểm đó
                    const rect = lightboxImg.getBoundingClientRect();
                    const clickXRatio = (e.clientX - rect.left) / rect.width;
                    const clickYRatio = (e.clientY - rect.top) / rect.height;

                    lightbox.classList.add('zoomed-in');

                    // Đợi trình duyệt render kích thước mới rồi tự động cuộn đến điểm bấm
                    setTimeout(() => {
                        const newWidth = lightboxImg.offsetWidth;
                        const newHeight = lightboxImg.offsetHeight;
                        lightbox.scrollLeft = (newWidth * clickXRatio) - (window.innerWidth / 2);
                        lightbox.scrollTop = (newHeight * clickYRatio) - (window.innerHeight / 2);
                    }, 50);
                }
            });

            // Kéo thả (Pan) khi đã phóng to trên máy tính
            lightboxImg.addEventListener('mousedown', (e) => {
                if (!lightbox.classList.contains('zoomed-in')) return;
                e.preventDefault(); 
                isPanning = true; 
                startX = e.pageX; startY = e.pageY; 
                scrollLeftStart = lightbox.scrollLeft; scrollTopStart = lightbox.scrollTop;
            });
            window.addEventListener('mouseup', () => { isPanning = false; });
            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return; 
                e.preventDefault(); 
                const walkX = e.pageX - startX; const walkY = e.pageY - startY; 
                lightbox.scrollLeft = scrollLeftStart - walkX; lightbox.scrollTop = scrollTopStart - walkY;
            });

            window.addEventListener('hashchange', handleRouting);
            handleRouting();
        });
    </script>
</body>
</html>
